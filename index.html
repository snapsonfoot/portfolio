<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f5;
      --text: #1a1916;
      --muted: #9a9690;
      --accent: #1a1916;
      --gap: 25px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 48px 56px 36px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .site-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.5rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      color: var(--text);
    }

    nav {
      display: flex;
      gap: 32px;
    }

    nav a {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav a:hover, nav a.active { color: var(--text); }

    /* ── HERO ── */
    .hero {
      padding: 12px 56px 48px;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.4rem, 5vw, 4.2rem);
      line-height: 1.1;
      letter-spacing: -0.01em;
      max-width: 600px;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--muted);
    }

    /* ── GALLERY ── */
    .gallery-section {
      padding: 0 56px 80px;
    }

    .filter-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: none;
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }

    .filter-btn:hover, .filter-btn.active { color: var(--text); }

    .filter-btn.active {
      border-bottom: 1px solid var(--text);
      padding-bottom: 1px;
    }

    /* JS-controlled masonry — 3 explicit columns */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      align-items: start;
    }

    .gallery-col {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    @media (max-width: 900px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 540px) {
      .gallery-grid { grid-template-columns: 1fr; }
      header, .hero, .gallery-section { padding-left: 24px; padding-right: 24px; }
    }

    .gallery-item {
      overflow: hidden;
      cursor: pointer;
      position: relative;
      display: block;
    }

    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.4s ease;
      filter: brightness(1);
    }

    .gallery-item:hover img {
      transform: scale(1.025);
      filter: brightness(0.92);
    }

    .gallery-item .caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 40px 16px 14px;
      background: linear-gradient(transparent, rgba(0,0,0,0.38));
      color: #fff;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .gallery-item:hover .caption { opacity: 1; }

    /* ── LIGHTBOX ── */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(248, 247, 245, 0.96);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox.open {
      display: flex;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

    #lightbox-img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      box-shadow: 0 24px 80px rgba(0,0,0,0.12);
      cursor: default;
    }

    #lightbox-close {
      position: absolute;
      top: 28px; right: 36px;
      background: none;
      border: none;
      font-size: 1.6rem;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      z-index: 101;
    }
    #lightbox-close:hover { color: var(--text); }

    #lightbox-prev, #lightbox-next {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 1.4rem;
      color: var(--muted);
      cursor: pointer;
      padding: 16px;
      transition: color 0.2s;
      z-index: 101;
    }
    #lightbox-prev { left: 16px; }
    #lightbox-next { right: 16px; }
    #lightbox-prev:hover, #lightbox-next:hover { color: var(--text); }

    #lightbox-meta {
      position: absolute;
      bottom: 28px; left: 50%; transform: translateX(-50%);
      text-align: center;
    }

    #lightbox-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--text);
      display: block;
    }

    #lightbox-counter {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 4px;
      display: block;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid #e4e2de;
      padding: 32px 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    footer span {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }


  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Snaps On Foot</h1>
  </section>



  <!-- GALLERY -->
  <section class="gallery-section" id="gallery">
    <div class="filter-bar" id="filterBar">
      <!-- Category buttons are generated automatically from your photo data -->
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </section>

  <!-- LIGHTBOX -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button id="lightbox-close" aria-label="Close">&#215;</button>
    <button id="lightbox-prev" aria-label="Previous photo">&#8592;</button>
    <img id="lightbox-img" src="" alt="" />
    <button id="lightbox-next" aria-label="Next photo">&#8594;</button>
    <div id="lightbox-meta">
      <span id="lightbox-title"></span>
      <span id="lightbox-counter"></span>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <span>By John Crisan</span>
    <span>&copy; 2026</span>
  </footer>

  <script>
    // ═══════════════════════════════════════════════
    //  YOUR PHOTOS — edit this list
    //  Each photo needs:
    //    src      → path to your image file
    //    title    → shown in the lightbox
    //    category → used for filtering (make up your own)
    // ═══════════════════════════════════════════════
const PHOTOS = [
  { src: "images/6717-7934.jpeg", title: "6717 7934", category: "Color" },
  { src: "images/7210-gold-2276.jpeg", title: "7210 Gold 2276", category: "Color" },
  { src: "images/8492-f-6163 (1).jpeg", title: "8492 F 6163 (1)", category: "Color" },
  { src: "images/8492-f-6162.jpeg", title: "8492 F 6162", category: "Color" },
  { src: "images/6717-7912.jpeg", title: "6717 7912", category: "Color" },
  { src: "images/1495-k-2236.jpeg", title: "1495 K 2236", category: "Color" },
  { src: "images/3951-k-4922.jpeg", title: "3951 K 4922", category: "Color" },
  { src: "images/5531-f-0878.jpeg", title: "5531 F 0878", category: "Color" },
  { src: "images/5531-f-0881.jpeg", title: "5531 F 0881", category: "Color" },
  { src: "images/1495-k-2248.jpeg", title: "1495 K 2248", category: "Color" },
  { src: "images/8492-f-6167.jpeg", title: "8492 F 6167", category: "Color" },
  { src: "images/6717-7917.jpeg", title: "6717 7917", category: "Color" },
  { src: "images/8493-p-6121.jpeg", title: "8493 P 6121", category: "Color" },
  { src: "images/5532-k-0769.jpeg", title: "5532 K 0769", category: "Color" },
  { src: "images/img_6237.jpeg", title: "Img 6237", category: "Color" },
  { src: "images/5531-f-0883.jpeg", title: "5531 F 0883", category: "Color" },
  { src: "images/img_5774.jpeg", title: "Img 5774", category: "Color" },
  { src: "images/5532-k-0765.jpeg", title: "5532 K 0765", category: "Color" },
  { src: "images/5531-f-0885.jpeg", title: "5531 F 0885", category: "Color" },
  { src: "images/3951-k-4905.jpeg", title: "3951 K 4905", category: "Color" },
  { src: "images/img_6009.jpeg", title: "Img 6009", category: "Color" },
  { src: "images/5532-k-0747.jpeg", title: "5532 K 0747", category: "Color" },
  { src: "images/img_6229.jpeg", title: "Img 6229", category: "Color" },
  { src: "images/img_6256.jpeg", title: "Img 6256", category: "Color" },
  { src: "images/3297-phoenix-4053.jpeg", title: "3297 Phoenix 4053", category: "Color" },
  { src: "images/img_5985.jpeg", title: "Img 5985", category: "Color" },
  { src: "images/img_6213.jpeg", title: "Img 6213", category: "Color" },
  { src: "images/img_7082.jpeg", title: "Img 7082", category: "Color" },
  { src: "images/3951-k-4920.jpeg", title: "3951 K 4920", category: "Color" },
  { src: "images/3297-phoenix-4027.jpeg", title: "3297 Phoenix 4027", category: "Color" },
  { src: "images/img_6015.jpeg", title: "Img 6015", category: "Color" },
  { src: "images/3297-phoenix-4024.jpeg", title: "3297 Phoenix 4024", category: "Color" },
  { src: "images/IMG_6247.jpeg", title: "IMG 6247", category: "B&W" },
  { src: "images/8979-8111.jpeg", title: "8979 8111", category: "B&W" },
  { src: "images/8979-8130.jpeg", title: "8979 8130", category: "B&W" },
  { src: "images/8979-8135.jpeg", title: "8979 8135", category: "B&W" },
  { src: "images/8979-8105.jpeg", title: "8979 8105", category: "B&W" },
  { src: "images/img_6261.jpeg", title: "Img 6261", category: "B&W" },
  { src: "images/IMG_6245.jpeg", title: "IMG 6245", category: "B&W" }
];
    // ═══════════════════════════════════════════════
    //  Everything below runs automatically — no need
    //  to edit unless you want to customise behaviour
    // ═══════════════════════════════════════════════

    let currentIndex = 0;
    let filtered = [...PHOTOS];

    // Build category filter buttons
    const categories = [...new Set(PHOTOS.map(p => p.category))];
    const filterBar = document.getElementById('filterBar');
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.filter = cat;
      btn.textContent = cat;
      filterBar.appendChild(btn);
    });

    // Render gallery — distributes photos into 3 explicit columns
    // Photos are assigned left-to-right: 0→col1, 1→col2, 2→col3, 3→col1...
    // This means your PHOTOS array order maps directly to visual left-to-right order
    function renderGallery(photos) {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = '';

      const numCols = window.innerWidth <= 540 ? 1 : window.innerWidth <= 900 ? 2 : 3;
      const colEls = [];
      for (let c = 0; c < numCols; c++) {
        const col = document.createElement('div');
        col.className = 'gallery-col';
        grid.appendChild(col);
        colEls.push(col);
      }

      photos.forEach((photo, i) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.innerHTML = `
          <img src="${photo.src}" alt="${photo.title}" loading="lazy" />
          <div class="caption">${photo.category}</div>
        `;
        item.addEventListener('click', () => openLightbox(i));
        colEls[i % numCols].appendChild(item);
      });
    }

    filtered = PHOTOS.filter(p => p.category === 'Color');
renderGallery(filtered);
document.querySelector('[data-filter="Color"]').classList.add('active');


    // Filter logic
    filterBar.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      filtered = PHOTOS.filter(p => p.category === f);
      renderGallery(filtered);
    });

    // Lightbox
    const lightbox   = document.getElementById('lightbox');
    const lbImg      = document.getElementById('lightbox-img');
    const lbTitle    = document.getElementById('lightbox-title');
    const lbCounter  = document.getElementById('lightbox-counter');

    function openLightbox(index) {
      currentIndex = index;
      showPhoto();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function showPhoto() {
      const photo = filtered[currentIndex];
      lbImg.src = photo.src;
      lbImg.alt = photo.title;
      lbTitle.textContent = photo.title;
      lbCounter.textContent = `${currentIndex + 1} / ${filtered.length}`;
    }

    function prevPhoto() {
      currentIndex = (currentIndex - 1 + filtered.length) % filtered.length;
      showPhoto();
    }

    function nextPhoto() {
      currentIndex = (currentIndex + 1) % filtered.length;
      showPhoto();
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', e => { e.stopPropagation(); prevPhoto(); });
    document.getElementById('lightbox-next').addEventListener('click', e => { e.stopPropagation(); nextPhoto(); });
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   prevPhoto();
      if (e.key === 'ArrowRight')  nextPhoto();
    });

    // Touch/swipe support
    let touchStartX = 0;
    lbImg.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
    lbImg.addEventListener('touchend', e => {
      const delta = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(delta) > 50) delta < 0 ? nextPhoto() : prevPhoto();
    });
  </script>
</body>
</html>
